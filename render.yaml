services:
  - type: web
    name: synapsecollab
    runtime: node
    buildCommand: |
      # Install Java JDK for code execution support
      apt-get update -y && apt-get install -y default-jdk gcc g++ python3 python3-pip
      npm install
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
